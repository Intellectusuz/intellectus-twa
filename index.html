<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellectus Uzbekistan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background">
        <header class="app-header">
            <h1 class="main-title">Intellectus Uzbekistan</h1>
        </header>

        <div class="user-block-float">
            <div class="user-profile-bar">
                <img id="user_avatar" src="https://via.placeholder.com/40" alt="Avatar">
                <div class="user-text-details">
                    <div id="user_name">Загрузка...</div>
                    <div class="points-row">🏆 Total IQ: <b id="user_points">0</b> pts</div>
                </div>
                <div class="uz-flag">🇺🇿</div>
            </div>
        </div>

        <div class="achievement-section">
            <div class="achievement-card">
                <div class="card-header">ВАШ ТЕКУЩИЙ СТАТУС</div>
                <div class="main-status">
                    <span id="current-title-display">НОВИЧОК</span>
                    <div class="progress-container-mini">
                        <div class="progress-fill-mini" id="total-progress-bar" style="width: 0%"></div>
                    </div>
                    <div class="percentage-text">Усвоение знаний: <span id="progress-percent">0%</span></div>
                </div>
                <div class="badges-row">
                    <div class="badge gold" title="Профессор">🎓</div>
                    <div class="badge" title="Магистр">📜</div>
                    <div class="badge" title="Ученик">📖</div>
                </div>
            </div>
        </div>

        <div class="two-column-grid">
            <section class="content-panel left-panel">
                <h2 class="panel-header">Список категорий</h2>
                <div class="category-list">
                    <button class="cat-item" onclick="startQuiz('law')">
                        <img src="https://img.icons8.com/gold/50/law.png" class="gold-icon">
                        <span>Юридика</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('history')">
                        <img src="https://img.icons8.com/gold/50/museum.png" class="gold-icon">
                        <span>История</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('lit')">
                        <img src="https://img.icons8.com/gold/50/open-book.png" class="gold-icon">
                        <span>Литература</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('geo')">
                        <img src="https://img.icons8.com/gold/50/globe.png" class="gold-icon">
                        <span>География</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('astro')">
                        <img src="https://img.icons8.com/gold/50/telescope.png" class="gold-icon">
                        <span>Астрономия</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('phys')">
                        <img src="https://img.icons8.com/gold/50/atom.png" class="gold-icon">
                        <span>Физика</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('chem')">
                        <img src="https://img.icons8.com/gold/50/test-tube.png" class="gold-icon">
                        <span>Химия</span>
                    </button>
                </div>
            </section>

            <section class="content-panel right-panel">
                <h2 class="panel-header">Супер-титул</h2>
                <div class="leaderboard-mini">
                    <p class="subtitle">ПРЕТЕНДЕНТЫ НА "ПРОФЕССОР"</p>
                    <div class="leaders-avatars">
                        <div class="leader r2"><img src="https://via.placeholder.com/30"><span>Amir_T</span></div>
                        <div class="leader r1"><img src="https://via.placeholder.com/45"><span>Brain_Uz</span></div>
                        <div class="leader r3"><img src="https://via.placeholder.com/30"><span>Lola_M</span></div>
                    </div>
                    <button class="gold-btn-small">Супер-Тест</button>
                </div>
            </section>
        </div>
    </div>

    <div id="quiz-screen" class="quiz-overlay" style="display:none;">
        <div class="quiz-card">
            <div class="quiz-header">
                <span id="question-number">1/10</span>
                <div id="timer" class="timer-circle">10</div>
            </div>
            <h2 id="question-text">Загрузка...</h2>
            <div id="answer-options" class="options-container"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
