<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellectus: Академические Звания</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background">
        <header class="app-header">
            <h1 class="main-title">Intellectus Uzbekistan</h1>
        </header>

        <div class="user-block-float">
            <div class="user-profile-bar">
                <img id="user_avatar" src="https://via.placeholder.com/40" alt="Avatar">
                <div class="user-text-details">
                    <div id="user_name">Artur (Новичок)</div>
                    <div class="points-row">
                        <span>🏆 Total IQ: <b id="user_points">1,500</b> pts</span>
                    </div>
                </div>
            </div>
        </div>
        
<div id="quiz-screen" class="quiz-overlay" style="display:none;">
    <div class="quiz-card">
        <div class="quiz-header">
            <span id="question-number">Вопрос 1/10</span>
            <div id="timer" class="timer-circle">10</div>
        </div>
        <h2 id="question-text">Загрузка вопроса...</h2>
        <div id="answer-options" class="options-container">
            </div>
    </div>
</div>
        <div class="two-column-grid">
            <section class="content-panel left-panel categories-panel">
                <h2 class="panel-header">Список категорий</h2>
                <div class="category-list">
                    <button class="cat-item">
                        <span class="icon">⚖️</span>
                        <span>Юридика</span>
                        <span class="arrow-icon">›</span>
                    </button>
                    <button class="cat-item">
                        <span class="icon">📜</span>
                        <span>История</span>
                        <span class="arrow-icon">›</span>
                    </button>
                    <button class="cat-item">
                        <span class="icon">📚</span>
                        <span>Литература</span>
                        <span class="arrow-icon">›</span>
                    </button>
                    <button class="cat-item">
                        <span class="icon">🌍</span>
                        <span>География</span>
                        <span class="arrow-icon">›</span>
                    </button>
                    <button class="cat-item">
                        <span class="icon">🚀</span>
                        <span>Астрономия</span>
                        <span class="arrow-icon">›</span>
                    </button>
                    <button class="cat-item">
                        <span class="icon">⚛️</span>
                        <span>Физика</span>
                        <span class="arrow-icon">›</span>
                    </button>
                    <button class="cat-item">
                        <span class="icon">🧪</span>
                        <span>Химия</span>
                        <span class="arrow-icon">›</span>
                    </button>
                </div>
            </section>

            <section class="content-panel right-panel super-title-panel">
                <h2 class="panel-header">Супер-титул</h2>
                <div class="title-details">
                    <h3>🏆 ПРЕТЕНДЕНТЫ НА ЗВАНИЕ "ПРОФЕССОР"</h3>
                    <div class="leaders-avatars">
                        <div class="leader rank-2">
                            <img src="https://via.placeholder.com/40" alt="Leader 2">
                            <span>Казах_Expert</span>
                        </div>
                        <div class="leader rank-1">
                            <img src="https://via.placeholder.com/50" alt="Leader 1">
                            <span>Tashkent_History</span>
                        </div>
                        <div class="leader rank-3">
                            <img src="https://via.placeholder.com/40" alt="Leader 3">
                            <span>Юрист_Nukus</span>
                        </div>
                    </div>
                    
                    <div class="leader-progress-block">
                        <p class="to-professor">До звания "Профессор":</p>
                        <p class="required-points">85% completion, 1250 pts needed</p>
                        <button class="super-test-btn">Пройти Супер-Тест месяца</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
