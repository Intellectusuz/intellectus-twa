<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Intelectus Uzbekistan</title>
    <style>
        /* БАРЧА ДИЗАЙН ШУ ЕРДА */
        body { background: radial-gradient(circle, #2c2c2c 0%, #000 100%); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .logo { background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 30px; font-weight: 900; margin: 20px 0; }
        .gold-border { border: 2px solid gold; padding: 15px; border-radius: 10px; margin: 10px; background: rgba(0,0,0,0.5); }
        .cat-card { background: rgba(255,255,255,0.1); border: 1px solid gold; padding: 15px; margin: 10px; border-radius: 8px; cursor: pointer; display: inline-block; width: 200px; }
        .cat-card:hover { background: gold; color: black; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid gold; padding: 30px; border-radius: 15px; width: 80%; }
    </style>
</head>
<body>

    <h1 class="logo">INTELECTUS UZBEKISTAN</h1>
    <p style="color: gold;">created by “A.K.Djuginisov”</p>

    <div class="gold-border">
        <h2>Hozirgi ball: <span id="score">0</span></h2>
        <p>Daraja: <span id="rank">Novichok</span></p>
    </div>

    <h3>Yo'nalishni tanlang:</h3>
    <div id="categories">
        <div class="cat-card" onclick="startTest('Tarix')">📜 Tarix</div>
        <div class="cat-card" onclick="startTest('Huquq')">⚖️ Huquq</div>
        <div class="cat-card" onclick="startTest('Geografiya')">🌍 Geografiya</div>
    </div>

    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <h2 id="timer" style="color: gold;">10</h2>
            <h3 id="question-text">Savol...</h3>
            <div id="options"></div>
        </div>
    </div>

    <script>
        // БАРЧА САВОЛЛАР ВА ЛОГИКА ШУ ЕРДА
        const questions = {
            "Tarix": [
                { q: "Amir Temur qachon tug'ilgan?", a: ["1336", "1405", "1300"], c: 0 },
                { q: "O'zbekiston mustaqilligi qachon?", a: ["1990", "1991", "1992"], c: 1 }
            ],
            "Huquq": [
                { q: "Konstitutsiya kuni qachon?", a: ["8-dekabr", "1-sentyabr", "21-mart"], c: 0 }
            ],
            "Geografiya": [
                { q: "Eng uzun daryo?", a: ["Sirdaryo", "Amudaryo", "Zarafshon"], c: 1 }
            ]
        };

        let currentScore = 0;
        let timeLeft = 10;
        let timer;

        function startTest(cat) {
            const qList = questions[cat];
            if(!qList) return;
            document.getElementById('quiz-modal').style.display = 'flex';
            showQuestion(qList[0]);
        }

        function showQuestion(q) {
            document.getElementById('question-text').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.style.padding = "10px"; btn.style.margin = "5px";
                btn.onclick = () => {
                    if(i === q.c) { currentScore += 10; alert("To'g'ri!"); }
                    closeTest();
                };
                optDiv.appendChild(btn);
            });
        }

        function closeTest() {
            document.getElementById('quiz-modal').style.display = 'none';
            document.getElementById('score').innerText = currentScore;
        }
    </script>
</body>
</html>
