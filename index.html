<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelectus Uzbekistan</title>
    <style>
        :root {
            --gold-main: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --noir-bg: radial-gradient(circle at center, #2c2c2c 0%, #000000 100%);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--noir-bg); color: white;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* Header */
        .main-header { width: 100%; text-align: center; padding: 20px 0; }
        .logo-3d {
            font-size: 35px; font-weight: 900; margin: 0;
            background: var(--gold-main); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-transform: uppercase;
        }
        .author { color: #d4af37; font-size: 12px; margin-top: 5px; opacity: 0.8; }

        /* Stats Card */
        .stats-container {
            display: flex; gap: 20px; margin: 20px 0;
            border: 2px solid #d4af37; padding: 15px 40px; border-radius: 15px;
            background: rgba(0,0,0,0.5); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .stat-item span { color: #fcf6ba; font-weight: bold; font-size: 20px; }

        /* Grid */
        .categories-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; width: 90%; max-width: 800px; margin-top: 20px;
        }

        .cat-card {
            background: rgba(255,255,255,0.05); border: 2px solid #d4af37;
            padding: 25px; border-radius: 15px; cursor: pointer;
            text-align: center; font-weight: bold; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .cat-card:hover {
            background: var(--gold-main); color: black;
            transform: translateY(-5px); box-shadow: 0 5px 15px rgba(212,175,55,0.4);
        }

        /* Quiz Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #111; border: 2px solid #d4af37; padding: 40px;
            border-radius: 25px; width: 90%; max-width: 500px; text-align: center;
        }
        #timer { font-size: 40px; color: #fcf6ba; font-weight: bold; margin-bottom: 20px; }
        .question-text { font-size: 22px; margin-bottom: 30px; line-height: 1.5; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            padding: 15px; border: 1px solid #d4af37; background: transparent;
            color: white; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .opt-btn:hover { background: #d4af37; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="logo-3d">INTELECTUS UZBEKISTAN</h1>
        <div class="author">created by “A.K.Djuginisov”</div>
    </header>

    <div class="stats-container">
        <div class="stat-item">Ball: <span id="score-val">0</span></div>
        <div class="stat-item">Unvon: <span id="rank-val">Novichok</span></div>
    </div>

    <div class="categories-grid">
        <div class="cat-card" onclick="startQuiz('Tarix')">📜 Tarix</div>
        <div class="cat-card" onclick="startQuiz('Huquq')">⚖️ Huquq</div>
        <div class="cat-card" onclick="startQuiz('Geografiya')">🌍 Geografiya</div>
    </div>

    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <div id="timer">10</div>
            <div id="q-text" class="question-text">Савол юкланмоқда...</div>
            <div id="options-box" class="options-grid"></div>
        </div>
    </div>

    <script>
        const quizData = {
            "Tarix": [
                { q: "Amir Temur qachon tug'ilgan?", o: ["1336-yil", "1342-yil", "1405-yil"], c: 0 },
                { q: "O'zbekiston mustaqilligi qachon?", o: ["1990-yil", "1991-yil", "1992-yil"], c: 1 },
                { q: "Alisher Navoiy nechanchi asrda yashagan?", o: ["14-asr", "15-asr", "16-asr"], c: 1 }
            ],
            "Huquq": [
                { q: "Konstitutsiya kuni qachon?", o: ["8-dekabr", "1-sentyabr", "21-mart"], c: 0 },
                { q: "O'zbekiston bayrog'ida nechta yulduz bor?", o: ["10 ta", "14 ta", "12 ta"], c: 2 }
            ],
            "Geografiya": [
                { q: "Eng uzun daryomiz?", o: ["Amudaryo", "Sirdaryo", "Zarafshon"], c: 0 },
                { q: "Eng baland cho'qqi?", o: ["Everest", "Hazrati Sulton", "G'alaba"], c: 1 }
            ]
        };

        let score = 0;
        let timerInterval;
        let currentQuestions = [];
        let qIndex = 0;

        function startQuiz(cat) {
            // Саволларни аралаштириш (тасодифий қилиш)
            currentQuestions = [...quizData[cat]].sort(() => Math.random() - 0.5);
            qIndex = 0;
            document.getElementById('quiz-modal').style.display = 'flex';
            showNextQuestion();
        }

        function showNextQuestion() {
            if (qIndex >= currentQuestions.length) {
                alert("Йўналишдаги барча саволлар тугади!");
                closeQuiz();
                return;
            }

            const data = currentQuestions[qIndex];
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('options-box');
            box.innerHTML = "";

            data.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, data.c);
                box.appendChild(btn);
            });

            startTimer();
        }

        function checkAnswer(selected, correct) {
            clearInterval(timerInterval);
            if (selected === correct) {
                score += 10;
                updateStats();
            }
            qIndex++;
            showNextQuestion();
        }

        function startTimer() {
            let left = 10;
            document.getElementById('timer').innerText = left;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                left--;
                document.getElementById('timer').innerText = left;
                if (left <= 0) {
                    clearInterval(timerInterval);
                    qIndex++;
                    showNextQuestion();
                }
            }, 1000);
        }

        function updateStats() {
            document.getElementById('score-val').innerText = score;
            const rank = document.getElementById('rank-val');
            if (score >= 50) rank.innerText = "Uchenik";
            if (score >= 100) rank.innerText = "Student";
            if (score >= 200) rank.innerText = "Bakalavr";
        }

        function closeQuiz() {
            clearInterval(timerInterval);
            document.getElementById('quiz-modal').style.display = 'none';
        }
    </script>
</body>
</html>
