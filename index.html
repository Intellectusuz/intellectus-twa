<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellectus Uzbekistan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background">
        <header class="app-header">
            <h1 class="main-title">Intellectus Uzbekistan</h1>
        </header>

        <div class="user-block-float">
            <div class="user-profile-bar">
                <img id="user_avatar" src="https://via.placeholder.com/40" alt="Avatar">
                <div class="user-text-details">
                    <div id="user_name">Загрузка...</div>
                    <div class="points-row">🏆 Total IQ: <b id="user_points">0</b> pts</div>
                </div>
                <div class="uz-flag">🇺🇿</div>
            </div>
        </div>

        <div class="achievement-section">
            <div class="achievement-card">
                <div class="card-header">ЛИЧНОЕ ДОСТИЖЕНИЕ</div>
                <div id="current-title-display">НОВИЧОК</div>
                <div class="progress-container-mini">
                    <div class="progress-fill-mini" id="total-progress-bar" style="width: 0%"></div>
                </div>
                <div class="percentage-text">Усвоение знаний: <span id="progress-percent">0%</span></div>
            </div>
        </div>

        <div class="two-column-grid">
            <section class="content-panel left-panel">
                <h2 class="panel-header">Список категорий</h2>
                <div class="category-list">
                    <button class="cat-item" onclick="startQuiz('law')">
                        <span class="gold-emoji">⚖️</span> <span>Юридика</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('history')">
                        <span class="gold-emoji">📜</span> <span>История</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('lit')">
                        <span class="gold-emoji">📚</span> <span>Литература</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('geo')">
                        <span class="gold-emoji">🌍</span> <span>География</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('astro')">
                        <span class="gold-emoji">🚀</span> <span>Астрономия</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('phys')">
                        <span class="gold-emoji">⚛️</span> <span>Физика</span>
                    </button>
                    <button class="cat-item" onclick="startQuiz('chem')">
                        <span class="gold-emoji">🧪</span> <span>Химия</span>
                    </button>
                </div>
            </section>

            <section class="content-panel right-panel">
                <h2 class="panel-header">Супер-титул</h2>
                <div class="title-details">
                    <h3>ПРЕТЕНДЕНТЫ НА ЗВАНИЕ "ПРОФЕССОР"</h3>
                    <div class="leaders-avatars">
                        <div class="leader rank-2">
                            <img src="https://via.placeholder.com/35" alt="L2">
                            <span>Amir_T</span>
                        </div>
                        <div class="leader rank-1">
                            <img src="https://via.placeholder.com/45" alt="L1">
                            <span>Brain_Uz</span>
                        </div>
                        <div class="leader rank-3">
                            <img src="https://via.placeholder.com/35" alt="L3">
                            <span>Lola_M</span>
                        </div>
                    </div>
                    <div class="leader-progress-block">
                        <p class="required-points">85% до звания</p>
                        <button class="super-test-btn">Супер-Тест</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="quiz-screen" class="quiz-overlay" style="display:none;">
        <div class="quiz-card">
            <div id="timer" class="timer-circle">10</div>
            <h2 id="question-text">Загрузка...</h2>
            <div id="answer-options" class="options-container"></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
