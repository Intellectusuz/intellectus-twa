<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelectus Uzbekistan</title>
    <style>
        /* ДИЗАЙН: НУАР ВА ОЛТИН 3D */
        :root {
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --bg: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        body {
            background: var(--bg); color: white; font-family: 'Arial', sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
        }

        /* LOGO 3D */
        .header { text-align: center; padding: 25px 0; }
        .logo-3d {
            font-size: 40px; font-weight: 900; margin: 0;
            background: var(--gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-transform: uppercase;
            filter: drop-shadow(3px 3px 5px rgba(0,0,0,0.8));
        }
        .creator { color: #d4af37; font-size: 14px; margin-top: -5px; }

        /* USER STATS */
        .top-nav {
            width: 90%; max-width: 1000px; display: flex; justify-content: space-between;
            align-items: center; margin: 20px 0; border: 1px solid #d4af37;
            padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.05);
        }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; border: 2px solid gold; padding: 2px; }
        .rank-card { text-align: right; min-width: 200px; }
        .progress-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 0.5s; }

        /* SPLIT LAYOUT */
        .main-container { display: flex; width: 95%; max-width: 1100px; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .left-panel { flex: 1; min-width: 300px; }
        .right-panel { flex: 2; min-width: 350px; }

        .panel-box { background: rgba(255,255,255,0.03); border: 1px solid #d4af37; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card {
            background: rgba(255,255,255,0.05); border: 1px solid #d4af37; padding: 20px;
            border-radius: 12px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.3s;
        }
        .cat-card:hover { background: var(--gold); color: black; transform: scale(1.05); }

        /* RATING COLORS */
        .gold-item { background: var(--gold); color: black; padding: 8px; border-radius: 5px; margin-bottom: 5px; font-weight: bold; }
        .silver-item { background: #C0C0C0; color: black; padding: 8px; border-radius: 5px; margin-bottom: 5px; }
        .bronze-item { background: #CD7F32; color: black; padding: 8px; border-radius: 5px; margin-bottom: 5px; }

        /* QUIZ MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); justify-content: center; align-items: center; z-index: 9999; }
        .quiz-content { background: #111; border: 2px solid #d4af37; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; }
        .timer { font-size: 35px; color: gold; font-weight: bold; margin-bottom: 15px; }
        .opt-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: transparent; color: white; border: 1px solid gold; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .opt-btn:hover { background: gold; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo-3d">INTELECTUS UZBEKISTAN</h1>
        <div class="creator">created by “A.K.Djuginisov”</div>
    </div>

    <div class="top-nav">
        <div class="user-info">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="avatar">
            <div>
                <div id="username" style="font-weight: bold; color: gold;">Artur</div>
                <div style="color: #ccc;">🏆 <span id="total-score">0</span> балл</div>
            </div>
        </div>
        <div class="rank-card">
            <div>Унвон: <strong id="rank-name" style="color: gold;">Novichok</strong></div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <small><span id="progress-percent">0</span>% кейинги босқичга</small>
        </div>
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="panel-box">
                <h3 style="color: gold; text-align: center;">ТОП 10 РЕЙТИНГ</h3>
                <div class="gold-item">1. Ажинияз — 540 балл</div>
                <div class="silver-item">2. Малика — 420 балл</div>
                <div class="bronze-item">3. Сардор — 380 балл</div>
                <div style="padding: 5px; border-bottom: 1px solid #444;">4. Темур — 310 балл</div>
            </div>
            <button onclick="alert('Супер саволлар тез кунда!')" style="width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">СУПЕР САВОЛ-ЖАВОБ</button>
        </div>

        <div class="right-panel">
            <div class="panel-box">
                <h3 style="color: gold;">ЙЎНАЛИШЛАР</h3>
                <div class="grid">
                    <div class="cat-card" onclick="startTest('Huquq')">⚖️ Ҳуқуқ</div>
                    <div class="cat-card" onclick="startTest('Tarix')">📜 Тарих</div>
                    <div class="cat-card" onclick="startTest('Geografiya')">🌍 География</div>
                    <div class="cat-card" onclick="alert('Тез кунда!')">📚 Адабиёт</div>
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-modal" class="modal">
        <div class="quiz-content">
            <div id="timer" class="timer">10</div>
            <h3 id="q-text">Савол...</h3>
            <div id="options-box"></div>
        </div>
    </div>

    <script>
        const quizData = {
            "Tarix": [
                { q: "Амир Темур қачон туғилган?", o: ["1336-йил", "1342-йил", "1405-йил", "1300-йил"], c: 0 },
                { q: "Ўзбекистон мустақиллиги қачон?", o: ["1990-йил", "1991-йил", "1992-йил", "1989-йил"], c: 1 },
                { q: "Алишер Навоий қайси асрда яшаган?", o: ["14-аср", "15-аср", "16-аср", "13-аср"], c: 1 }
            ],
            "Huquq": [
                { q: "Конституция куни қачон?", o: ["8-декабр", "1-сентябр", "21-март", "10-декабр"], c: 0 },
                { q: "Давлат бошлиғи ким?", o: ["Бош вазир", "Президент", "Сенат раиси", "Халқ"], c: 1 }
            ],
            "Geografiya": [
                { q: "Энг узун дарёмиз?", o: ["Амударё", "Сирдарё", "Зарафшон", "Норин"], c: 0 },
                { q: "Дунёдаги энг катта қитъа?", o: ["Африка", "Осиё", "Европа", "Америка"], c: 1 }
            ]
        };

        let currentQ = [];
        let index = 0;
        let score = 0;
        let total = 0;
        let timer;

        function startTest(cat) {
            if(!quizData[cat]) return;
            currentQ = [...quizData[cat]].sort(() => Math.random() - 0.5);
            index = 0;
            score = 0;
            document.getElementById('quiz-modal').style.display = 'flex';
            nextQ();
        }

        function nextQ() {
            if(index >= currentQ.length) {
                finish();
                return;
            }
            const data = currentQ[index];
            document.getElementById('q-text').innerText = (index + 1) + ". " + data.q;
            const box = document.getElementById('options-box');
            box.innerHTML = "";
            data.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "opt-btn";
                btn.innerText = opt;
                btn.onclick = () => check(i, data.c);
                box.appendChild(btn);
            });
            startTimer();
        }

        function check(sel, cor) {
            clearInterval(timer);
            if(sel === cor) {
                score++;
                total++;
                updateUI();
            }
            index++;
            nextQ();
        }

        function startTimer() {
            let s = 10;
            document.getElementById('timer').innerText = s;
            clearInterval(timer);
            timer = setInterval(() => {
                s--;
                document.getElementById('timer').innerText = s;
                if(s <= 0) { clearInterval(timer); index++; nextQ(); }
            }, 1000);
        }

        function finish() {
            clearInterval(timer);
            document.getElementById('quiz-modal').style.display = 'none';
            alert("Тест тугади! Сиз " + score + " балл тўпладингиз.");
        }

        function updateUI() {
            document.getElementById('total-score').innerText = total;
            const ranks = ["Novichok", "Uchenik", "Student", "Bakalavr", "Magistr", "Professor"];
            let rIdx = Math.floor(total / 100);
            if(rIdx > 5) rIdx = 5;
            document.getElementById('rank-name').innerText = ranks[rIdx];
            let prog = total % 100;
            document.getElementById('progress-fill').style.width = prog + "%";
            document.getElementById('progress-percent').innerText = prog;
        }
    </script>
</body>
</html>
